<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>INS — Moral Reasoning</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, serif;
      max-width: 960px;
      margin: 2em auto;
      padding: 0 1.5em;
      color: #222;
      line-height: 1.6;
    }
    h1 { font-size: 1.7em; margin-bottom: 0.15em; }
    .subtitle { color: #666; font-style: italic; margin-bottom: 2.5em; font-size: 0.95em; }
    h2 {
      font-size: 1.15em;
      border-bottom: 2px solid #ccc;
      padding-bottom: 0.3em;
      margin: 2.5em 0 0.8em;
    }
    h3 { font-size: 1em; color: #444; margin: 1.2em 0 0.4em; }
    table { border-collapse: collapse; width: 100%; font-size: 0.88em; margin: 0.5em 0 1em; }
    th, td { border: 1px solid #ddd; padding: 5px 10px; text-align: left; vertical-align: top; }
    th { background: #f5f5f5; font-weight: bold; }
    ol { padding-left: 1.6em; margin: 0.3em 0; }
    li { margin: 0.3em 0; font-size: 0.9em; }
    code { font-family: monospace; font-size: 0.92em; }

    /* value colour tags */
    .val {
      display: inline-block;
      font-family: monospace;
      font-size: 0.82em;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: bold;
    }
    .lifeH    { background: #cce5ff; color: #004085; }
    .lifeC    { background: #d4edda; color: #155724; }
    .freedomH { background: #fff3cd; color: #856404; }
    .freedomC { background: #f8d7da; color: #721c24; }

    .agent-hal   { color: #0056b3; }
    .agent-carla { color: #6f42c1; }

    .empty { color: #999; font-style: italic; }
    .audience-block { margin: 1em 0 1.5em; }
    .order { font-size: 0.88em; color: #555; margin-bottom: 0.4em; }
    .count  { font-size: 0.88em; color: #666; margin-bottom: 0.4em; }
    .loading { color: #aaa; font-style: italic; }
    .err { color: #c00; }
  </style>
</head>
<body>

<h1>INS — Moral Reasoning System</h1>
<p class="subtitle">
  Action-based Alternating Transition System with Value-Based Argumentation ·
  Atkinson &amp; Bench-Capon (2006) · Bench-Capon (2003)
</p>

<h2>Arguments</h2>
<p class="count" id="args-count"></p>
<div id="args" class="loading">Loading…</div>

<h2>Attacks</h2>
<p class="count" id="attacks-count"></p>
<div id="attacks" class="loading">Loading…</div>

<h2>Dung Extensions</h2>
<div id="extensions" class="loading">Loading…</div>

<h2>VAF Extensions by Audience</h2>
<div id="vaf" class="loading">Loading…</div>

<script>
/* ---- helpers ---- */

function valTag(v) {
  return `<span class="val ${v}">${v}</span>`;
}

function fmtArg(a) {
  const acts = Array.isArray(a.actions) ? a.actions.join(', ') : a.actions;
  return `<code>${acts}</code> → ${valTag(a.value)}`;
}

function fmtExt(ext) {
  if (!ext || ext.length === 0) return '<span class="empty">∅</span>';
  return ext.map(fmtArg).join('<br>');
}

function agentSpan(ag) {
  return `<span class="agent-${ag}">${ag}</span>`;
}

function get(url) { return fetch(url).then(r => r.json()); }

/* ---- arguments ---- */

get('/args').then(args => {
  const hal   = args.filter(a => a.agent === 'hal');
  const carla = args.filter(a => a.agent === 'carla');

  document.getElementById('args-count').textContent =
    `${args.length} total (${hal.length} Hal · ${carla.length} Carla)`;

  function agentTable(list, ag) {
    if (list.length === 0) return `<p class="empty">No arguments for ${ag}.</p>`;
    const rows = list.map(a =>
      `<tr><td><code>${Array.isArray(a.actions) ? a.actions.join(', ') : a.actions}</code></td>` +
      `<td>${valTag(a.value)}</td></tr>`
    ).join('');
    return `<table><tr><th>Action sequence</th><th>Value promoted</th></tr>${rows}</table>`;
  }

  document.getElementById('args').innerHTML =
    `<h3>${agentSpan('hal')} — individual actions</h3>${agentTable(hal, 'hal')}` +
    `<h3>${agentSpan('carla')} — joint actions</h3>${agentTable(carla, 'carla')}`;
});

/* ---- attacks ---- */

get('/attacks').then(attacks => {
  document.getElementById('attacks-count').textContent =
    `${attacks.length} attack pairs`;

  const rows = attacks.map(a =>
    `<tr><td>${fmtArg(a.attacker)}</td><td>${fmtArg(a.attacked)}</td></tr>`
  ).join('');
  document.getElementById('attacks').innerHTML =
    `<table><tr><th>Attacker</th><th>Attacked</th></tr>${rows}</table>`;
});

/* ---- Dung extensions ---- */

get('/extensions').then(data => {
  let html = `<h3>Grounded</h3><p>${fmtExt(data.grounded)}</p>`;

  html += `<h3>Preferred (${data.preferred.length})</h3><ol>` +
    data.preferred.map(e => `<li>${fmtExt(e)}</li>`).join('') + '</ol>';

  html += `<h3>Stable (${data.stable.length})</h3><ol>` +
    data.stable.map(e => `<li>${fmtExt(e)}</li>`).join('') + '</ol>';

  document.getElementById('extensions').innerHTML = html;
});

/* ---- VAF ---- */

get('/vaf').then(audiences => {
  Promise.all(
    audiences.map(a =>
      Promise.all([
        get(`/vaf/${a.audience}`),
        get(`/vaf/${a.audience}/grounded`)
      ])
    )
  ).then(results => {
    const html = results.map(([pref, gnd]) => {
      const order = pref.order.map(valTag).join(' &gt; ');
      const groundedHtml = fmtExt(gnd.grounded);
      const prefHtml = pref.preferred.length === 0
        ? '<span class="empty">none</span>'
        : '<ol>' + pref.preferred.map(e => `<li>${fmtExt(e)}</li>`).join('') + '</ol>';

      return `<div class="audience-block">
        <h3>${pref.audience}</h3>
        <p class="order">Value order: ${order}</p>
        <p><strong>Grounded:</strong> ${groundedHtml}</p>
        <strong>Preferred:</strong>${prefHtml}
      </div>`;
    }).join('<hr style="border:none;border-top:1px solid #eee;margin:1em 0">');

    document.getElementById('vaf').innerHTML = html;
  });
});
</script>
</body>
</html>
